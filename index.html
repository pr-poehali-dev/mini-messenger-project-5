  <script>
    // ── Service Worker — автообновление без участия пользователя ──────────────
    // Как только приходит новая версия sw.js — она активируется (skipWaiting в sw.js)
    // и страница автоматически перезагружается сама, подтягивая свежий билд.
    if ('serviceWorker' in navigator) {
      var reloadedForUpdate = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (reloadedForUpdate) return;
        reloadedForUpdate = true;
        window.location.reload();
      });
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(function(reg) {
          reg.update();
          // Проверяем наличие новой версии каждые 60 секунд, пока приложение открыто
          setInterval(function() { reg.update(); }, 60000);
        })
        .catch(function() {});
    }

    // splash убран — функция-заглушка чтобы не было ошибок в React
    window.__hideSplash = function() {};

    // ── Клавиатура на мобильных: композер должен оставаться видимым над ней ───
    // 100dvh не пересчитывается при появлении клавиатуры в PWA на iOS, поэтому
    // высота #root подстраивается под visualViewport — БЕЗ CSS transition и БЕЗ
    // скролла страницы, так что шапка (position: sticky) физически не сдвигается,
    // а нижняя часть (композер) просто оказывается видимой над клавиатурой.
    (function() {
      function setAppHeight() {
        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', h + 'px');
      }
      setAppHeight();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight);
      } else {
        window.addEventListener('resize', setAppHeight);
      }
    })();
    document.addEventListener('scroll', function() { window.scrollTo(0, 0); }, { passive: true });

    // Автоматическая тёмная тема как у Т-Банка
    (function() {
      var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (isDark) document.documentElement.classList.add('dark');
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (e.matches) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      });
    })();
  </script>
